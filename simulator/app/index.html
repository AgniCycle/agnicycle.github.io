<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07090f;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: rgba(255,255,255,0.08);
    --text: #f0f6ff;
    --text2: #8b9ab0;
    --text3: #556070;
    --fire: #f97316;
    --teal: #0ea5b7;
    --gold: #fbbf24;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }

  /* ── App shell ── */
  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Top bar ── */
  .app-bar {
    height: 52px;
    background: rgba(7,9,15,0.97);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
    flex-shrink: 0;
    z-index: 10;
  }

  /* brand */
  .app-bar-brand {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--text);
    font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px;
    flex-shrink: 0;
  }
  .app-bar-brand:hover { opacity: 0.8; }
  .app-bar-logo {
    width: 28px; height: 28px; border-radius: 7px;
    background: #0B2536; border: 1.5px solid #0ea5b7;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(14,165,183,0.25);
  }
  .app-bar-logo svg { width: 16px; height: 16px; }
  .app-bar-brand em { color: var(--fire); font-style: normal; }

  .app-bar-divider {
    width: 1px; height: 22px;
    background: var(--border);
    margin: 0 14px;
    flex-shrink: 0;
  }

  /* app title area */
  .app-bar-title {
    display: flex; align-items: center; gap: 10px;
    flex: 1; min-width: 0;
  }
  .app-bar-name {
    font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px;
    color: var(--text); white-space: nowrap;
  }
  .app-bar-version {
    display: flex; align-items: center; gap: 5px;
    background: rgba(249,115,22,0.12);
    border: 1px solid rgba(249,115,22,0.25);
    border-radius: 20px;
    padding: 2px 9px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 500;
    color: var(--fire);
    white-space: nowrap;
  }
  .app-bar-version-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--fire);
    box-shadow: 0 0 6px var(--fire);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* right side actions */
  .app-bar-actions {
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .app-bar-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 7px;
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 500;
    color: var(--text2); text-decoration: none;
    border: 1px solid transparent;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    cursor: pointer; background: none;
    white-space: nowrap;
  }
  .app-bar-btn:hover {
    color: var(--text);
    background: var(--surface2);
    border-color: var(--border);
  }
  .app-bar-btn svg { flex-shrink: 0; }
  .app-bar-btn-primary {
    background: var(--fire);
    color: #fff;
    border-color: transparent;
  }
  .app-bar-btn-primary:hover {
    background: #ea6c0a;
    color: #fff;
    border-color: transparent;
  }

  /* ── iframe ── */
  .app-frame {
    flex: 1;
    border: none;
    width: 100%;
    display: block;
    background: var(--bg);
  }

  /* ── Loading overlay ── */
  .app-loading {
    position: absolute; inset: 52px 0 0 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .app-loading.hidden { opacity: 0; }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--surface2);
    border-top-color: var(--fire);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text3);
  }

  @media (max-width: 600px) {
    .app-bar-name { display: none; }
    .hide-mobile { display: none; }
  }

/* ── LIGHT THEME ── */
[data-theme="light"] {
  --bg: #f5f7fa; --surface: #ffffff; --surface2: #edf2f8;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.13);
  --text: #1e293b; --text2: #475569; --text3: #94a3b8;
}
[data-theme="light"] .app-bar { background: rgba(245,247,250,0.98); border-bottom-color: rgba(0,0,0,0.07); }
[data-theme="light"] .app-loading { background: var(--bg); }
[data-theme="light"] .app-frame { background: var(--bg); }
#theme-sun { display: none; }
[data-theme="light"] #theme-moon { display: none; }
[data-theme="light"] #theme-sun { display: block; }
.app-bar-icon-btn { display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:7px; background:var(--surface2); border:1px solid var(--border); color:var(--text2); cursor:pointer; transition:color 0.2s,background 0.2s; flex-shrink:0; }
</style>

<script>
(function(){
  // Forwards the short-lived SSO token from /account/'s "Open" link onto the
  // embedded tool so it can sign the user in without asking again — absent
  // param just falls back to the plain URL, identical to before this existed.
  var base = 'https://agnicycle-engine-simulator-865384871824.us-west2.run.app';
  var token = new URLSearchParams(window.location.search).get('ssoToken');
  document.getElementById('app-frame').src = token ? base + '/?ssoToken=' + encodeURIComponent(token) : base;
})();
</script>
<script>
(function(){ const t=localStorage.getItem('agni-theme')||'light'; document.documentElement.setAttribute('data-theme',t); })();
function toggleTheme(){ const n=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('agni-theme',n); }
(function(){
  var btn=document.getElementById('fullscreen-btn');
  if(!btn)return;
  var expand=document.getElementById('fs-expand');
  var shrink=document.getElementById('fs-shrink');
  function updateIcon(){var f=!!document.fullscreenElement;expand.style.display=f?'none':'';shrink.style.display=f?'':'none';}
  function toggleFS(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(function(){});}else{document.exitFullscreen();}}
  btn.addEventListener('click',toggleFS);
  document.addEventListener('fullscreenchange',updateIcon);
  document.addEventListener('keydown',function(e){if((e.key==='f'||e.key==='F')&&!e.ctrlKey&&!e.metaKey&&!e.altKey){var t=document.activeElement&&document.activeElement.tagName;if(t!=='INPUT'&&t!=='TEXTAREA'&&t!=='SELECT')toggleFS();}});
})();
</script>
