<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07090f; --bg2: #0d1320; --surface: #111827; --surface2: #1a2235;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --fire: #f97316; --teal: #0ea5b7;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
.topbar { display: flex; align-items: center; justify-content: space-between; height: 48px; padding: 0 20px; flex-shrink: 0; background: rgba(7,9,15,0.97); border-bottom: 1px solid var(--border); gap: 12px; }
.topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.topbar-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; flex-shrink: 0; }
.topbar-brand:hover { text-decoration: none; }
.logo-mark { width: 26px; height: 26px; border-radius: 7px; background: #0B2536; border: 1.5px solid var(--teal); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(14,165,183,0.25); flex-shrink: 0; }
.logo-mark svg { width: 15px; height: 15px; }
.brand-em { color: var(--fire); }
.topbar-sep { color: var(--border2); font-size: 18px; font-weight: 200; flex-shrink: 0; }
.topbar-title { font-size: 13px; font-weight: 600; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.topbar-back { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: var(--text3); text-decoration: none; padding: 5px 10px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
.topbar-back:hover { color: var(--text); border-color: var(--border2); text-decoration: none; }
.topbar-badge { font-size: 11px; font-weight: 600; color: var(--teal); background: rgba(14,165,183,0.1); border: 1px solid rgba(14,165,183,0.22); padding: 3px 10px; border-radius: 100px; white-space: nowrap; }
.frame-wrap { flex: 1; position: relative; overflow: hidden; }
.frame-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
.frame-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: var(--bg2); font-size: 14px; color: var(--text2); transition: opacity 0.4s; pointer-events: none; }
.frame-loading.hidden { opacity: 0; }
.spinner { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--teal); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* ── LIGHT THEME ── */
[data-theme="light"] {
  --bg: #f5f7fa; --bg2: #edf1f7; --surface: #ffffff; --surface2: #edf2f8;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.13);
  --text: #1e293b; --text2: #475569; --text3: #94a3b8;
}
[data-theme="light"] .topbar { background: rgba(245,247,250,0.97); border-bottom-color: rgba(0,0,0,0.07); }
[data-theme="light"] body { background: var(--bg); }
#theme-sun { display: none; }
[data-theme="light"] #theme-moon { display: none; }
[data-theme="light"] #theme-sun { display: block; }
.topbar-icon-btn { display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:7px; background:var(--surface2); border:1px solid var(--border); color:var(--text2); cursor:pointer; transition:color 0.2s,background 0.2s; flex-shrink:0; }
</style>

<body>
<div class="topbar">
  <div class="topbar-left">
    <a class="topbar-brand" href="/">
      <div class="logo-mark">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs><radialGradient id="g" cx="50%" cy="68%" r="62%"><stop offset="0%" stop-color="#FFF06B"/><stop offset="60%" stop-color="#F97316"/><stop offset="100%" stop-color="#F0500F"/></radialGradient></defs>
          <path d="M50 8 C68 32 75 52 66 68 C59 80 43 86 31 78 C19 70 16 54 25 42 C29 52 37 58 43 52 C37 40 41 22 50 8 Z" fill="url(#g)"/>
        </svg>
      </div>
      <span>Agni<span class="brand-em">Cycle</span></span>
    </a>
    <span class="topbar-sep">/</span>
    <span class="topbar-title">Y⁺ Calculator</span>
  </div>
  <div class="topbar-right">
    <button class="topbar-icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark" style="margin-right:4px">
      <svg id="theme-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="theme-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="topbar-icon-btn" id="fullscreen-btn" aria-label="Toggle fullscreen" title="Fullscreen (F)" style="margin-right:4px">
      <svg id="fs-expand" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
      <svg id="fs-shrink" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
    </button>
    <span class="topbar-badge">CFD Tool</span>
    <a class="topbar-back" href="/cfd-calculators/">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      All Calculators
    </a>
  </div>
</div>
<div class="frame-wrap">
  <div class="frame-loading" id="loader">
    <div class="spinner"></div>
    <span>Loading calculator…</span>
  </div>
  <iframe
    src="https://y-plus-calculator-865384871824.us-west2.run.app"
    title="Y+ Calculator"
    loading="eager"
    onload="document.getElementById('loader').classList.add('hidden')"
  ></iframe>
</div>
<script>
(function(){ const t=localStorage.getItem("agni-theme")||"light"; document.documentElement.setAttribute("data-theme",t); })();
function toggleTheme(){ const n=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light"; document.documentElement.setAttribute("data-theme",n); localStorage.setItem("agni-theme",n); }
(function(){
  var btn=document.getElementById('fullscreen-btn');
  if(!btn)return;
  var expand=document.getElementById('fs-expand');
  var shrink=document.getElementById('fs-shrink');
  function updateIcon(){var f=!!document.fullscreenElement;expand.style.display=f?'none':'';shrink.style.display=f?'':'none';}
  function toggleFS(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(function(){});}else{document.exitFullscreen();}}
  btn.addEventListener('click',toggleFS);
  document.addEventListener('fullscreenchange',updateIcon);
  document.addEventListener('keydown',function(e){if((e.key==='f'||e.key==='F')&&!e.ctrlKey&&!e.metaKey&&!e.altKey){var t=document.activeElement&&document.activeElement.tagName;if(t!=='INPUT'&&t!=='TEXTAREA'&&t!=='SELECT')toggleFS();}});
})();
</script>
</body>
