<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fuel Spray Calculator — AgniCycle</title>
<meta name="description" content="Fuel injection spray characterization — droplet SMD, penetration, cone angle, and evaporation via Hiroyasu–Arai and Reitz–Diwakar correlations. Browser-native, no install."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07090f;
    --surface: #0d1117;
    --surface2: #161b22;
    --border: rgba(255,255,255,0.08);
    --text: #f0f6ff;
    --text2: #8b9ab0;
    --text3: #556070;
    --fire: #f97316;
    --teal: #0ea5b7;
    --gold: #fbbf24;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .app-bar {
    height: 52px;
    background: rgba(7,9,15,0.97);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 0;
    flex-shrink: 0;
    z-index: 10;
  }

  .app-bar-brand {
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--text);
    font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px;
    flex-shrink: 0;
  }
  .app-bar-brand:hover { opacity: 0.8; }
  .app-bar-logo {
    width: 28px; height: 28px; border-radius: 7px;
    background: #0B2536; border: 1.5px solid #0ea5b7;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(14,165,183,0.25);
  }
  .app-bar-logo svg { width: 16px; height: 16px; }
  .app-bar-brand em { color: var(--fire); font-style: normal; }

  .app-bar-divider {
    width: 1px; height: 22px;
    background: var(--border);
    margin: 0 14px;
    flex-shrink: 0;
  }

  .app-bar-title {
    display: flex; align-items: center; gap: 10px;
    flex: 1; min-width: 0;
  }
  .app-bar-name {
    font-family: 'Sora', sans-serif; font-weight: 600; font-size: 14px;
    color: var(--text); white-space: nowrap;
  }
  .app-bar-version {
    display: flex; align-items: center; gap: 5px;
    background: rgba(14,165,183,0.12);
    border: 1px solid rgba(14,165,183,0.25);
    border-radius: 20px;
    padding: 2px 9px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 500;
    color: var(--teal);
    white-space: nowrap;
  }
  .app-bar-version-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 6px var(--teal);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .app-bar-actions {
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0;
  }
  .app-bar-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 7px;
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 500;
    color: var(--text2); text-decoration: none;
    border: 1px solid transparent;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    cursor: pointer; background: none;
    white-space: nowrap;
  }
  .app-bar-btn:hover {
    color: var(--text);
    background: var(--surface2);
    border-color: var(--border);
  }
  .app-bar-btn svg { flex-shrink: 0; }
  .app-bar-btn-primary {
    background: var(--fire);
    color: #fff;
    border-color: transparent;
  }
  .app-bar-btn-primary:hover {
    background: #ea6c0a;
    color: #fff;
    border-color: transparent;
  }

  .app-frame {
    flex: 1;
    border: none;
    width: 100%;
    display: block;
    background: var(--bg);
  }

  .app-loading {
    position: absolute; inset: 52px 0 0 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .app-loading.hidden { opacity: 0; }
  .loading-spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--surface2);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text3);
  }

  @media (max-width: 600px) {
    .app-bar-name { display: none; }
    .hide-mobile { display: none; }
  }

/* ── LIGHT THEME ── */
[data-theme="light"] {
  --bg: #f5f7fa; --surface: #ffffff; --surface2: #edf2f8;
  --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.13);
  --text: #1e293b; --text2: #475569; --text3: #94a3b8;
}
[data-theme="light"] .app-bar { background: rgba(245,247,250,0.98); border-bottom-color: rgba(0,0,0,0.07); }
[data-theme="light"] .app-loading { background: var(--bg); }
[data-theme="light"] .app-frame { background: var(--bg); }
#theme-sun { display: none; }
[data-theme="light"] #theme-moon { display: none; }
[data-theme="light"] #theme-sun { display: block; }
.app-bar-icon-btn { display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:7px; background:var(--surface2); border:1px solid var(--border); color:var(--text2); cursor:pointer; transition:color 0.2s,background 0.2s; flex-shrink:0; }
</style>
</head>
<body>
<div class="app-shell">

  <div class="app-bar">
    <a class="app-bar-brand" href="/">
      <div class="app-bar-logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="ng" cx="50%" cy="68%" r="62%">
              <stop offset="0%" stop-color="#FFF06B"/>
              <stop offset="60%" stop-color="#F97316"/>
              <stop offset="100%" stop-color="#F0500F"/>
            </radialGradient>
          </defs>
          <path d="M50 8 C68 32 75 52 66 68 C59 80 43 86 31 78 C19 70 16 54 25 42 C29 52 37 58 43 52 C37 40 41 22 50 8 Z" fill="url(#ng)"/>
        </svg>
      </div>
      <span>Agni<em>Cycle</em></span>
    </a>

    <div class="app-bar-divider"></div>

    <div class="app-bar-title">
      <span class="app-bar-name">Fuel Spray Calculator</span>
      <span class="app-bar-version">
        <span class="app-bar-version-dot"></span>
        Live · Beta
      </span>
    </div>

    <div class="app-bar-actions">
      <button class="app-bar-icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">
        <svg id="theme-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="theme-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="app-bar-icon-btn" id="fullscreen-btn" aria-label="Toggle fullscreen" title="Fullscreen (F)">
        <svg id="fs-expand" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <svg id="fs-shrink" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
      </button>
      <a class="app-bar-btn hide-mobile" href="/#about">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Docs
      </a>
      <a class="app-bar-btn hide-mobile" href="/simulator">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C9 8 6 11 6 14a6 6 0 0012 0c0-3-3-6-6-12z"/></svg>
        Engine Sim
      </a>
      <a class="app-bar-btn app-bar-btn-primary" href="/">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to site
      </a>
    </div>
  </div>

  <div class="app-loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading spray calculator…</div>
  </div>

  <iframe
    class="app-frame"
    id="app-frame"
    src="https://spray-calculator-865384871824.us-west2.run.app"
    title="AgniCycle Fuel Spray Calculator"
    allow="fullscreen"
    onload="document.getElementById('loading').classList.add('hidden')"
  ></iframe>

</div>
<script>
(function(){ const t=localStorage.getItem('agni-theme')||'light'; document.documentElement.setAttribute('data-theme',t); })();
function toggleTheme(){ const n=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('agni-theme',n); }
(function(){
  var btn=document.getElementById('fullscreen-btn');
  if(!btn)return;
  var expand=document.getElementById('fs-expand');
  var shrink=document.getElementById('fs-shrink');
  function updateIcon(){var f=!!document.fullscreenElement;expand.style.display=f?'none':'';shrink.style.display=f?'':'none';}
  function toggleFS(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(function(){});}else{document.exitFullscreen();}}
  btn.addEventListener('click',toggleFS);
  document.addEventListener('fullscreenchange',updateIcon);
  document.addEventListener('keydown',function(e){if((e.key==='f'||e.key==='F')&&!e.ctrlKey&&!e.metaKey&&!e.altKey){var t=document.activeElement&&document.activeElement.tagName;if(t!=='INPUT'&&t!=='TEXTAREA'&&t!=='SELECT')toggleFS();}});
})();
</script>
</body>
</html>
